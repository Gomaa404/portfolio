<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Viewport: prevent tap delay on mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Abdallah Mohamedgomaa – Frontend Developer</title>
    <meta name="description" content="Frontend Developer specializing in React, Next.js, Node.js, and modern web technologies. Building pixel-perfect, performant digital experiences." />
    <meta name="keywords" content="Frontend Developer, React Developer, Next.js, Node.js, Web Developer, Cairo" />
    <meta property="og:title" content="Abdallah Mohamedgomaa – Frontend Developer" />
    <meta property="og:description" content="Frontend Developer building premium digital experiences." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#030712" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
    <!-- Mobile: disable tap highlight & enable fast touch -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- Fonts: single load with display=swap to prevent FOIT -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- DNS prefetch for external resources -->
    <link rel="dns-prefetch" href="https://github.com" />

    <!--
      ╔══════════════════════════════════════════════════════╗
      ║  ANTI-FOUC: runs synchronously before first paint.  ║
      ║  Sets data-theme and .dark class on <html> BEFORE   ║
      ║  React hydrates → zero flash of wrong theme.        ║
      ╚══════════════════════════════════════════════════════╝
    -->
    <script>
      (function () {
        var saved = localStorage.getItem('theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var theme = saved === 'light' ? 'light'
                  : saved === 'dark'  ? 'dark'
                  : prefersDark       ? 'dark'
                  :                     'light';
        document.documentElement.setAttribute('data-theme', theme);
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
